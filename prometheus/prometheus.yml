global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "roomkit-monitor"
    metrics_path: /metrics
    static_configs:
      - targets:
          # IP oder DNS-Name des Python-Rechners anpassen
          - "192.168.3.100:8000"
        labels:
          device_type: "roomkit-mini"
          course: "webex-api"
